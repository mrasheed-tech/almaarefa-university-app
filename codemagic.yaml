# Codemagic CI/CD — Almaarefa University App
# Pipeline: push to GitHub → Codemagic builds (Expo prebuild + Xcode) → TestFlight

workflows:
  ios-testflight:
    name: iOS -> TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    integrations:
      app_store_connect: Codemagic   # matches the key name in Personal Account -> Settings -> Developer Portal

    environment:
      node: 20.20.2
      xcode: 16.2
      cocoapods: default
      vars:
        BUNDLE_ID: "sa.edu.um.app"
        XCODE_WORKSPACE: "AlmaarefaUniversity.xcworkspace"
        XCODE_SCHEME: "AlmaarefaUniversity"
        EXPO_PUBLIC_SUPABASE_URL: "https://mkpvhnpobhfjhtotcktb.supabase.co"
        EXPO_PUBLIC_SUPABASE_ANON_KEY: "sb_publishable_N6lV07f9Ibw6yFe7IEd08w_t4-Z8dP9"
        EXPO_PUBLIC_PORTAL_URL: "https://portal.um.edu.sa"
        EXPO_PUBLIC_MOODLE_URL: "https://lms.um.edu.sa"
        EXPO_PUBLIC_WEBMAIL_URL: "https://outlook.office.com/mail/"

    scripts:
      - name: Install JS dependencies
        script: npm ci

      - name: Expo prebuild
        script: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Initialize keychain
        script: keychain initialize

      - name: Fetch or create signing certificate and provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply signing settings to Xcode project
        script: xcode-project use-profiles

      - name: Set build number
        script: |
          cd ios
          BUILD_NUMBER=$(git rev-list --count HEAD)
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
